name: Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

env:
  CMAKE_PRESET: full-ninja

jobs:
  build:
    name: ${{ matrix.os_name }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Debug, Release]
        include:
          - os: ubuntu-latest
            os_name: Linux
          - os: windows-latest
            os_name: Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev xvfb

      - name: Configure
        run: cmake --preset ${{ env.CMAKE_PRESET }}
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DGLFW_BUILD_WAYLAND=OFF

      - name: Build
        run: cmake --build --preset ${{ env.CMAKE_PRESET }}

      - name: Install Mesa (Windows)
        if: runner.os == 'Windows'
        uses: f3d-app/install-mesa-windows-action@v1
        with:
          path: ${{github.workspace}}/build/bin/${{ matrix.config }}/tests

      - name: Test (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run -a ctest --preset ${{ env.CMAKE_PRESET }}

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: ctest --preset ${{ env.CMAKE_PRESET }}
