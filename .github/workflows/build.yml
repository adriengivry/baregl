name: Build

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main

jobs:
  build:
    name: ${{ matrix.os_name }} ${{ matrix.config }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        config: [Debug, Release]
        include:
          - os: ubuntu-latest
            os_name: Linux
            generate_tests: ON
            run_tests: true
          - os: windows-latest
            os_name: Windows
            generate_tests: ON
            run_tests: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgl-dev libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev xvfb

      - name: Configure
        run: cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.config }}
          -DBAREGL_GENERATE_EXAMPLES=ON
          -DBAREGL_GENERATE_TESTS=${{ matrix.generate_tests }}
          -DGLFW_BUILD_WAYLAND=OFF

      - name: Build
        run: cmake --build build --config ${{ matrix.config }}

      - name: Test (Linux)
        if: matrix.run_tests && runner.os == 'Linux'
        run: xvfb-run -a ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

      - name: Test (Windows)
        if: matrix.run_tests && runner.os == 'Windows'
        run: ctest --test-dir build -C ${{ matrix.config }} --output-on-failure

